version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "direct"
    commit-message:
      prefix: ":arrow_up:"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: ":arrow_up:"
  # Docs site: vitepress is the only direct dependency. Everything else in
  # the npm tree (including vue) is transitively managed by vitepress and
  # must not be bumped independently.
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    allow:
      - dependency-name: "vitepress"
    commit-message:
      prefix: ":arrow_up:"
  # Widget SDK: only the toolchain heads; codemirror etc. ride along.
  - package-ecosystem: "npm"
    directory: "/web/sdk"
    schedule:
      interval: "weekly"
    allow:
      - dependency-name: "svelte"
      - dependency-name: "vite"
      - dependency-name: "vitest"
      - dependency-name: "@sveltejs/vite-plugin-svelte"
    commit-message:
      prefix: ":arrow_up:"
