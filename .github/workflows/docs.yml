name: docs
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --extra all
      - name: Autogenerate reference documentation
        run: uv run python docs/.vitepress/pydocgen.py
      - name: Validate pydoc references
        run: uv run python docs/.vitepress/pydocgen.py --validate
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install npm dependencies
        run: npm ci
        working-directory: docs
      - name: Build
        run: |
          npx vitepress build
          cp -r .vitepress/public/* .vitepress/dist/ 2>/dev/null || true
          cp -r logo .vitepress/dist/ 2>/dev/null || true
        working-directory: docs
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/.vitepress/dist
